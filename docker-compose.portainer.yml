services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - django_pgdata:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      AUCTION_RELIST_DAYS: ${AUCTION_RELIST_DAYS}
      AUCTION_DURATION_DAYS: ${AUCTION_DURATION_DAYS}
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
      python manage.py migrate &&
      python manage.py collectstatic --noinput &&
      gunicorn core.wsgi:application --workers 4 --bind 0.0.0.0:8000 --timeout=300 --graceful-timeout 300
      "
    volumes:
      - staticfiles:/app/staticfiles
      - mediafiles:/app/media
    restart: always

  nginx:
    build:
      context: ./nginx
    depends_on:
      - web
    ports:
      - "8095:80"
    volumes:
      - staticfiles:/app/staticfiles:ro
      - mediafiles:/app/media:ro
    restart: always
    networks:
      - default
      - fanz-net

  auction_worker:
    build: .
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      AUCTION_RELIST_DAYS: ${AUCTION_RELIST_DAYS}
      AUCTION_DURATION_DAYS: ${AUCTION_DURATION_DAYS}
    depends_on:
      db:
        condition: service_healthy
    command: sh /app/run_auction_tasks.sh
    volumes:
      - staticfiles:/app/staticfiles
      - mediafiles:/app/media
    restart: always

volumes:
  django_pgdata:
    external: true
    name: django-monolith_django_pgdata
  staticfiles:
  mediafiles:

networks:
  fanz-net:
    external: true
    name: fanz-net
