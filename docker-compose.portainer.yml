services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - django_pgdata:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
      python manage.py migrate &&
      python manage.py collectstatic --noinput &&
      gunicorn core.wsgi:application --workers 4 --bind 0.0.0.0:8000 --timeout=300 --graceful-timeout 300
      "
    volumes:
      - ./web:/app
      - staticfiles:/app/staticfiles
      - ./web/media:/app/media
    restart: always

  nginx:
    image: nginx:alpine
    depends_on:
      - web
    ports:
      - "8095:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - staticfiles:/app/staticfiles:ro
      - ./web/media:/app/media
    restart: always
    networks:
      - default
      - fanz-net

  auction_worker:
    build: .
    
    depends_on:
      db:
        condition: service_healthy
    command: sh /app/run_auction_tasks.sh
    volumes:
      - ./web:/app
      - staticfiles:/app/staticfiles
      - ./web/media:/app/media
    restart: always

volumes:
  django_pgdata:
  staticfiles:

networks:
  fanz-net:
    external: true
    name: fanz-net
