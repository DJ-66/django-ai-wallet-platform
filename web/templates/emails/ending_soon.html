<!DOCTYPE html>
<html>
<body style="margin:0;padding:0;background:#f4f7fb;font-family:Arial,Helvetica,sans-serif;color:#1f2937;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f4f7fb;padding:30px 12px;">
    <tr>
      <td align="center">
        <table width="100%" cellpadding="0" cellspacing="0" style="max-width:620px;background:#ffffff;border-radius:20px;overflow:hidden;box-shadow:0 10px 30px rgba(15,23,42,0.08);">

          <tr>
            <td style="background:linear-gradient(135deg,#111827,#f59e0b);padding:34px 28px;text-align:center;color:#ffffff;">
              <div style="font-size:42px;line-height:1;">🔥</div>
              <h1 style="margin:14px 0 0;font-size:28px;line-height:1.2;">
                Auction ending soon
              </h1>
              <p style="margin:10px 0 0;font-size:15px;color:#fef3c7;">
                Less than 60 minutes remaining.
              </p>
            </td>
          </tr>

          <tr>
            <td style="padding:32px 28px;">

              <div style="background:#f9fafb;border:1px solid #e5e7eb;border-radius:16px;padding:22px;margin:0 0 22px;">
                <h2 style="margin:0 0 12px;font-size:22px;line-height:1.3;color:#111827;">
                  {{ auction.title }}
                </h2>

                <p style="margin:0;font-size:16px;color:#374151;">
                  <strong>Current price:</strong>
                  <span style="font-size:20px;color:#f59e0b;font-weight:700;">
                    {{ auction.current_price|floatformat:0 }} credits
                  </span>
                </p>
              </div>

              <p style="margin:0 0 16px;font-size:16px;line-height:1.6;">
                Time is running out. Return now if you want another chance to win this auction.
              </p>

              <p style="margin:24px 0;text-align:center;">
                <a href="{{ auction_url }}" style="display:inline-block;background:#f59e0b;color:#111827;text-decoration:none;font-size:16px;font-weight:700;padding:14px 24px;border-radius:12px;">
                  View Auction
                </a>
              </p>

              <p style="margin:18px 0 0;font-size:13px;line-height:1.5;color:#6b7280;word-break:break-all;">
                Backup link:<br>
                <a href="{{ auction_url }}" style="color:#f59e0b;">{{ auction_url }}</a>
              </p>

            </td>
          </tr>

          <tr>
            <td style="border-top:1px solid #e5e7eb;padding:20px 28px;text-align:center;">
              <p style="margin:0;font-size:12px;color:#9ca3af;">
                © {% now "Y" %} USDRick.com
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
