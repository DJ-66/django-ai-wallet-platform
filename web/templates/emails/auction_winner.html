<!DOCTYPE html>
<html>
<body style="font-family:Arial,sans-serif;background:#f4f7fb;padding:30px;">
  <div style="max-width:620px;margin:auto;background:white;border-radius:18px;padding:30px;">
    <h1>🎉 You won!</h1>

    <p>Congrats {{ user.username }} — you won:</p>

    <h2>{{ auction.title }}</h2>

    <p><strong>Final price:</strong> {{ auction.current_price|floatformat:0 }} credits</p>

    {% if delivery_url %}
      <p>Your delivery URL:</p>
      <p>
        <a href="{{ delivery_url }}">
          {{ delivery_url }}
        </a>
      </p>
    {% else %}
      <p>Your delivery details will be sent soon.</p>
    {% endif %}

    <hr>

    <p style="font-size:12px;color:#777;">
      © {% now "Y" %} USDRick.com
    </p>
  </div>
</body>
</html>
