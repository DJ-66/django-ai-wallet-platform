{% extends "base.html" %}
{% load socialaccount %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-icon">🔐</div>

    <h1>Welcome back</h1>
    <p class="auth-subtitle">
      Sign in to continue to auctions, AI companions, and your wallet.
    </p>

    <a href="{% provider_login_url 'google' %}" class="google-login-btn">
      <span class="google-icon">G</span>
      Continue with Google
    </a>

    <div class="auth-divider"><span>or</span></div>

    <form method="post" action="{% url 'account_login' %}" class="auth-form">
      {% csrf_token %}
      {{ form.as_p }}

      <button type="submit" class="auth-primary-btn">
        Sign In
      </button>
    </form>

    <p class="auth-footer-text">
      New here?
      <a href="{% url 'account_signup' %}">Create an account</a>
    </p>
  </div>
</div>
{% endblock %}
