{% autoescape off %}
<!DOCTYPE html>
<html>
<body style="margin:0; padding:0; background:#f3f4f6; font-family:Arial, sans-serif; color:#111827;">

<table width="100%" cellpadding="0" cellspacing="0" style="background:#f3f4f6; padding:32px 12px;">
<tr>
<td align="center">

<table width="100%" cellpadding="0" cellspacing="0" style="max-width:560px; background:#ffffff; border-radius:18px; overflow:hidden;">
<tr>
<td style="padding:32px 28px; text-align:center;">

<div style="font-size:42px; margin-bottom:14px;">🔐</div>

<h1 style="margin:0 0 12px; font-size:26px; color:#111827;">
Reset your password
</h1>

<p style="margin:0 0 24px; font-size:16px; line-height:1.6; color:#4b5563;">
We received a request to reset your password. Click the button below to choose a new one.
</p>

<a href="{{ password_reset_url }}"
   style="display:inline-block; background:#111827; color:#ffffff; text-decoration:none; padding:14px 24px; border-radius:12px; font-weight:bold;">
Reset Password
</a>

<p style="margin:26px 0 0; font-size:13px; line-height:1.6; color:#6b7280;">
If you did not request this, you can safely ignore this email.
</p>

<p style="margin:18px 0 0; font-size:12px; line-height:1.5; color:#9ca3af; word-break:break-all;">
{{ password_reset_url }}
</p>

</td>
</tr>
</table>

</td>
</tr>
</table>

</body>
</html>
{% endautoescape %}
