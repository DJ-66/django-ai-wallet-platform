{% extends "base.html" %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-icon">👋</div>

    <h1>Sign out?</h1>
    <p class="auth-subtitle">
      Are you sure you want to sign out of your account?
    </p>

    <form method="post" action="{% url 'account_logout' %}" class="auth-form">
      {% csrf_token %}
      <button type="submit" class="auth-primary-btn">
        Yes, sign me out
      </button>
    </form>

    <p class="auth-footer-text">
      <a href="/auctions/">Cancel and return to auctions</a>
    </p>
  </div>
</div>
{% endblock %}
