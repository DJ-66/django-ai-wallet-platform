{% extends "base.html" %}
{% load i18n %}

{% block content %}

<div class="auth-page">
    <div class="auth-card">
        <div class="auth-icon">✅</div>

        <h2>{% trans "Password Updated" %}</h2>

        <p class="auth-subtitle">
            {% trans "Your password has been changed successfully." %}
        </p>

        <a href="{% url 'account_login' %}" class="auth-primary-btn auth-link-btn">
            {% trans "Sign In" %}
        </a>
    </div>
</div>

{% endblock %}
