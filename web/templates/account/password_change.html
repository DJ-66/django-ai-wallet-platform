{% extends "base.html" %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-icon">🔑</div>

        <h2>Change Password</h2>

        <p class="auth-subtitle">
            Update your account password.
        </p>

        <form method="post" class="auth-form">
            {% csrf_token %}
            {{ form.as_p }}

            <button type="submit" class="auth-primary-btn">
                Update Password
            </button>
        </form>
    </div>
</div>
{% endblock %}
